 <body>
          <h4>उपयोगकर्ताओं के लिए उपलब्ध स्टॉक</h4>

      <div id="items"></div>
    <style>
    #items{
        color: white;
        background-color: darkslategrey;
    }
    body{
        margin-top: 1cm;
    }
    h3{
        color: palevioletred;
        margin-left: 1.5cm;
    }
    button{
        margin-left: 3.5cm;
        color: red;
    }
    h4{
        margin-left: 2cm;
        color: gold;
    }
    h2{
        margin-left: 3cm;
    }
     hr{
        color: white;
        h4{
            margin-left: 2cm;
        }
    }
</style>
 <script>
let items = JSON.parse(localStorage.getItem("items") || "[]");

function show(){
    let html = "";

    items.forEach(item=>{
        html += `
        <div style="border:1px solid red; padding:10px; margin:10px;">
            <h2>शीर्षक</h2>
            <h3>${item.title}</h3>
            <hr>
                        <h2>कीमत</h2>
            <h3>₹${item.price}</h3>
            <hr>
            <h2>वर्णन</h2>
            <h3>${item.desc}</h3>
<hr>
            <button class="btn btn-danger"onclick="contact('${item.whatsapp}')">
                अभी खरीदें
            </button>
        </div>
        `;
    });

    document.getElementById("items").innerHTML = html;
}

function contact(num){
    window.open("https://wa.me/9813132098?text=मुझे इस शीर्षक के बारे में और अधिक जानकारी चाहिए।");
}

show();
</script>
