<style>
body {
    font-family: Arial;
    background: #e5ddd5;
    padding: 15px;
}

.chat {
    display: flex;
    margin-bottom: 10px;
}

.chat img {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    margin-right: 8px;
}

.bubble {
    background: #dcf8c6;
    padding: 10px;
    border-radius: 10px;
    max-width: 75%;
}

.comment {
    font-size: 14px;
}

.meta {
    font-size: 12px;
    color: gray;
}
</style>
</head>

<body>

<h3>Customer Reviews</h3>
<div id="chatBox"></div>

<script>
fetch("buyer.json")
.then(res => res.json())
.then(data => {
    data.forEach(b => {
        document.getElementById("chatBox").innerHTML += `
        <div class="chat">
            <img src="${b.photo}">
            <div class="bubble">
                <div class="comment">${b.comment}</div>
                <div class="meta">
                    ${b.name} | ${b.village}<br>
                    ${b.product} - ₹${b.price}<br>
                    ${b.date}
                </div>
            </div>
        </div>
        `;
    });
});
</script>

</body>
</html>
