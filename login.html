 <body>
    <style>
        body{
            background-color: darkcyan;
            box-shadow: 2px 2px 2px 2px green;
            margin-top: 4cm;
            margin-left: 0.5cm;
        }
        button{
            margin-left: 2cm;
        }
        .card-header{
            background-color: peru;
        }
        h2{
            margin-left: 2cm;
        }
        h4{
            margin-left: 1cm;
        }
    </style>
    <div class="card">
        <div class="card-header">
  <h2>ज्योतिष लॉगिन</h2>
        </div>
        <div class="card-footer">
            <h4>user-id:<input id="id" placeholder="ID"><br><br></h4> 
            <h4>password<input id="pass" type="password" placeholder="Password"><br><br></h4>
 
<button class="btn btn-danger" onclick="login()">Login</button>

        </div>
    </div>
 
 
<script>
async function login(){
    let res = await fetch("admin.json");
    let data = await res.json();

    if(id.value === data.id && pass.value === data.pass){
        localStorage.setItem("admin","true");
        window.location = "admin.html";
    } else {
        alert("Wrong login");
    }
}
</script>
