 <body>
        <style>
        body{
            background-color: darkcyan;
            box-shadow: 2px 2px 2px 2px green;
            margin-top: 4cm;
            margin-left: 0.5cm;
        }
        button{
            margin-left: 2cm;
        }
        .card-header{
            background-color: peru;
        }
        h2{
            margin-left: 2cm;
        }
        h4{
            margin-left: 0.5cm;
        }
    </style>

 <div class="card">
 <div class="card-header">
           <h2>Admin Panel</h2>
    <div class="card-footer">
<h4><input id="title" placeholder="शीर्षक"></h4><br>
 <h4> <input id="price" placeholder="कीमत"><br></h4> 
<h4><input id="desc" placeholder="वर्णन"><br></h4> 
<h4><input id="wa" placeholder="WhatsApp नंबर"><br></h4> 
    </div>
    <button class="btn btn-success" onclick="addItem()">इसे कार्ट में जोड़ें</button>
</div>
 </div>
 <hr>
<div id="items"></div>

<script>
if(localStorage.getItem("admin") !== "true"){
    location="login.html";
}

let items = JSON.parse(localStorage.getItem("items") || "[]");

function show(){
    let html="";
    items.forEach((item,i)=>{
        html+=`
        <div>
            <div class="card">
                <div class="card-header">
                    <h2>शीर्षक: ${item.title} </h2>
                    <hr>
                    <h2>कीमत:₹${item.price}</h2>
                    <hr>
                                <h2>वर्णन:${item.desc}</h3>
                    </div>
                    <div class="card-footer">
                                    <button class="btn btn-dark" onclick="del(${i})">इस कार्ट को हटाएँ</button>
                        </div>
                </div>
                <hr>
         </div>`;
    });
    document.getElementById("items").innerHTML = html;
}

function addItem(){
    let item = {
        title:title.value,
        price:price.value,
        desc:desc.value,
        whatsapp:wa.value
    };

    items.push(item);
    localStorage.setItem("items", JSON.stringify(items));
    show();
}

function del(i){
    items.splice(i,1);
    localStorage.setItem("items", JSON.stringify(items));
    show();
}
show();
 </script>
 </body>
