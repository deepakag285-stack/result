     <!--for selectiong clsss-->
<h2>Search Result by Roll Number & DOB</h2>
<select id="classSelect">
    <option value="">Select Class</option>
    <option value="9">Class 9</option>
    <option value="10">Class 10</option>
    <option value="11">Class 11</option>
    <option value="12">Class 12</option>
</select>
<hr>
<input type="number" id="rollno" placeholder="Enter Roll Number">
<input type="date" id="dob" placeholder="Select DOB">
<hr>
<button onclick="searchResult()">Search</button>
<hr>
<div id="output" class="output-card"></div>
<hr>
 <script>
async function searchResult() {
    const classValue = document.getElementById("classSelect").value;
    const roll = document.getElementById("rollno").value.trim();
    const dob = document.getElementById("dob").value;

    if (!classValue) {
        document.getElementById("output").innerHTML = "<p style='color:red;'>Please select Class.</p>";
        return;
    }

    if (!roll || !dob) {
        document.getElementById("output").innerHTML = "<p style='color:red;'>Please enter both Roll No and DOB.</p>";
        return;
    }

    const csvFiles = {
        "9": "class9.csv",
        "10": "class10.csv",
        "11": "class11.csv",
        "12": "class12.csv"
    };

    const csvFile = csvFiles[classValue] || "class12.csv";
    const response = await fetch(csvFile);
    const data = await response.text();

    const rows = data.trim().split("\n").slice(1); // skip header

    const formatCsvDob = csvDob => {
        const parts = csvDob.trim().split("/");
        if (parts.length !== 3) return csvDob.trim();
        const [d, m, y] = parts;
        return `${y.padStart(4, "0")}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
    };

    const markRow = (label, value) => {
        const numeric = parseInt(value, 10);
        const status = !isNaN(numeric) ? (numeric > 33 ? "pass" : "fail") : "";
        return `<tr class="${status}"><th>${label}</th><td>${value || "N/A"}</td></tr>`;
    };

    const calculateMark = value => {
        const numeric = parseInt(value, 10);
        return !isNaN(numeric) ? numeric : 0;
    };

    let found = false;
    let outputHtml = "";

    rows.forEach(row => {
        if (!row.trim()) return;
        const cols = row.split(",");
        const csvRoll = cols[0]?.trim();
        const csvDob = formatCsvDob(cols[2] || "");

        if (csvRoll === roll && csvDob === dob) {
            const maths = calculateMark(cols[3]);
            const science = calculateMark(cols[4]);
            const english = calculateMark(cols[5]);
            const total = maths + science + english;
            const percentage = total / 300 * 100;
            const passedSubjects = [maths, science, english].filter(mark => mark > 33).length;
            const resultText = percentage > 33 && passedSubjects >= 2 ? "Pass" : "Fail";

            const classText = `Class ${classValue}`;
            outputHtml = `
                <div class="message success">Result found for ${classText}</div>
                <table class="result-table">
                    <tr><th>Roll No</th><td>${cols[0]}</td></tr>
                    <tr><th>Name</th><td>${cols[1]}</td></tr>
                    <tr><th>DOB</th><td>${cols[2]}</td></tr>
                    ${markRow("Maths", cols[3])}
                    ${markRow("Science", cols[4])}
                    ${markRow("English", cols[5])}
                    <tr><th>Total</th><td>${total} / 300</td></tr>
                    <tr><th>Percentage</th><td>${percentage.toFixed(2)}%</td></tr>
                    <tr><th>Final Result</th><td>${resultText}</td></tr>
                </table>
            `;
            found = true;
        }
    });

    if (!found) {
        outputHtml = "<p style='color:red;'>Student Not Found for selected class.</p>";
    }

    document.getElementById("output").innerHTML = outputHtml;
}
</script>
