 <!DOCTYPE html>
<html>
<head>
  <title>Student Result</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-container">
    <h3>describe your problems</h3>
    <textarea id="problemtext" placeholder="explain your issue"></textarea>
    <button onclick="sendtowhatshap()">submit</button>
  </div>
<!--for single-->
<div class="container">
  <img src="images/frame0000.png" class="logo">
  <h2>School Result Portal</h2>

  <input type="text" id="rollno" placeholder="Enter Roll No">
  <input type="date" id="dob">
  <button onclick="searchResult()">Search</button>

  <div id="result"></div>
</div>
<h4>result of class-12 has been declared on 24 april-2026</h4>
<script src="script.js"></script>
<style>
    body {
  font-family: Arial;
  background: linear-gradient(to right, #36d1dc, #5b86e5);
  text-align: center;
}

h4{
  color: yellow;
}
.container {
  background: white;
  padding: 20px;
  margin: 50px auto;
  width: 350px;
  border-radius: 10px;
}

.logo {
  width: 80px;
}

input {
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 10px;
}

button {
  padding: 10px 20px;
  background: #5b86e5;
  color: white;
  border: none;
  cursor: pointer;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}
td:last-child{
    font-weight: bold;
    color: green;
}
 th, td {
  border: 1px solid #ddd;
  padding: 10px;
}

th {
  background: #5b86e5;
  color: white;
}
.star-row {
  font-size: 1.3rem;
  color: #fdd835;
  margin: 12px 0 6px;
}
.wow-text {
  font-size: 1.2rem;
  font-weight: bold;
  color: #ff4081;
  margin-top: 10px;
  animation: wow-pulse 1.2s ease-in-out infinite alternate;
}
@keyframes wow-pulse {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}
</style>
<script>
async function searchResult() {
  const rollno = document.getElementById("rollno").value.trim();
  const dob = document.getElementById("dob").value;
  const resultDiv = document.getElementById("result");

  if (!rollno || !dob) {
    resultDiv.innerHTML = `<p style="color:red;">Please enter both Roll No and DOB.</p>`;
    return;
  }

  const response = await fetch("Book 2(Sheet1).csv");
  const text = await response.text();
  const rows = text.replace(/^\uFEFF/, "").trim().split(/\r?\n/).slice(1);

  const csvToDate = csvDate => {
    const [m, d, y] = csvDate.split("/");
    if (!m || !d || !y) return "";
    return `${y}-${m.padStart(2, "0")}-${d.padStart(2, "0")}`;
  };

  const student = rows
    .map(row => row.split(","))
    .map(cols => ({
      rollno: cols[0],
      name: cols[1],
      dob: csvToDate(cols[2]),
      maths: cols[3],
      science: cols[4],
      english: cols[5]
    }))
    .find(s => s.rollno === rollno && s.dob === dob);

  if (student && student.rollno) {
    const maths = parseInt(student.maths, 10) || 0;
    const science = parseInt(student.science, 10) || 0;
    const english = parseInt(student.english, 10) || 0;
    const total = maths + science + english;
    const percentage = (total / 300) * 100;

    let grade = "Fail";
    if (percentage >= 90) grade = "A+";
    else if (percentage >= 75) grade = "A";
    else if (percentage >= 60) grade = "B";
    else if (percentage >= 50) grade = "C";
    else if (percentage >= 34) grade = "D";

    let remark = "Fail";
    if (percentage > 95) remark = "✨ Outstanding ✨";
    else if (percentage > 80) remark = "Excellent";
    else if (percentage > 50) remark = "Good";
    else if (percentage > 33) remark = "Pass";

    resultDiv.innerHTML = `
      <div class="star-row">✨ ✨ ✨ ✨ ✨</div>
      <table>
        <tr><th>Roll No</th><td>${student.rollno}</td></tr>
        <tr><th>Name</th><td>${student.name}</td></tr>
        <tr><th>DOB</th><td>${dob}</td></tr>
        <tr><th>Maths</th><td>${maths}</td></tr>
        <tr><th>Science</th><td>${science}</td></tr>
        <tr><th>English</th><td>${english}</td></tr>
        <tr><th>Total</th><td>${total}</td></tr>
        <tr><th>Out of</th><td>300</td></tr>
        <tr><th>Percentage</th><td>${percentage.toFixed(2)}%</td></tr>
        <tr><th>Grade</th><td>${grade}</td></tr>
        <tr><th>Remark</th><td>${remark}</td></tr>
      </table>
      <div class="star-row">✨ ✨ ✨ ✨ ✨</div>
     `;
  } else {
    resultDiv.innerHTML = `<p style="color:red;">Invalid Roll No or DOB</p>`;
  }
}
</script>
</body>
</html>
